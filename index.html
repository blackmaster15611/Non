<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Monster Slayer Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 5px;
            z-index: 100;
        }
        
        #score {
            margin-bottom: 10px;
        }
        
        #health {
            margin-bottom: 10px;
        }
        
        #healthBar {
            width: 200px;
            height: 30px;
            background: #333;
            border: 2px solid white;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        #healthFill {
            height: 100%;
            background: #00ff00;
            width: 100%;
            transition: width 0.2s;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 40px 60px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 200;
        }
        
        #gameOverTitle {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }
        
        #gameOverScore {
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        #restartBtn {
            padding: 15px 40px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        #restartBtn:hover {
            background: #45a049;
        }
        
        #mobileControls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 150;
        }
        
        .controlBtn {
            width: 60px;
            height: 60px;
            background: rgba(100, 200, 255, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .controlBtn:active {
            background: rgba(100, 200, 255, 1);
        }
        
        #attackBtn {
            background: rgba(255, 100, 100, 0.7);
            width: 80px;
            height: 80px;
            font-size: 28px;
        }
        
        #attackBtn:active {
            background: rgba(255, 100, 100, 1);
        }
        
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        
        @media (max-width: 600px) {
            #ui {
                font-size: 16px;
                padding: 10px 15px;
            }
            
            #healthBar {
                width: 150px;
            }
            
            #instructions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="health">Health:</div>
        <div id="healthBar">
            <div id="healthFill"></div>
        </div>
    </div>
    
    <div id="gameOver">
        <div id="gameOverTitle">GAME OVER!</div>
        <div id="gameOverScore">Final Score: 0</div>
        <button id="restartBtn">Restart Game</button>
    </div>
    
    <div id="mobileControls">
        <button class="controlBtn" id="upBtn">⬆️</button>
        <div style="display: flex; gap: 10px;">
            <button class="controlBtn" id="leftBtn">⬅️</button>
            <button class="controlBtn" id="downBtn">⬇️</button>
            <button class="controlBtn" id="rightBtn">➡️</button>
        </div>
        <button id="attackBtn">⚔️ ATTACK</button>
    </div>
    
    <div id="instructions">
        PC: WASD to move, Mouse to look, Click to attack | Mobile: Use buttons
    </div>
    
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
