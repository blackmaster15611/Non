<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 30px;
        }

        .search-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            grid-column: 1 / -1;
        }

        .search-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        #locationInput {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #locationInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f1f3f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .unit-selector {
            display: flex;
            gap: 5px;
            background: #f1f3f5;
            padding: 5px;
            border-radius: 8px;
        }

        .unit-selector button {
            padding: 8px 15px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .unit-selector button.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .sidebar {
            grid-column: 2;
            grid-row: 2;
        }

        #favorites {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .favorite-btn {
            padding: 10px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
        }

        .favorite-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .weather-content {
            grid-column: 1;
            grid-row: 2;
        }

        #currentWeather,
        #forecast {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.5s;
            margin-bottom: 20px;
        }

        #currentWeather.active,
        #forecast.active {
            opacity: 1;
        }

        .weather-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
            align-items: center;
        }

        .location-info h2 {
            font-size: 2em;
            color: #333;
            margin-bottom: 5px;
        }

        .location-info p {
            color: #999;
            font-size: 0.95em;
        }

        .temperature-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .weather-icon {
            font-size: 4em;
            color: #667eea;
        }

        .temp-info {
            display: flex;
            flex-direction: column;
        }

        .current-temp {
            font-size: 3em;
            font-weight: bold;
            color: #333;
        }

        .weather-description {
            font-size: 1.2em;
            color: #666;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .detail-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .detail-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .detail-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        #forecast h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .forecast-item:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .forecast-day {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .forecast-temp {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .forecast-desc {
            font-size: 0.8em;
            color: #666;
            margin-top: 8px;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            text-align: center;
            z-index: 1000;
        }

        #loading.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #errorMessage {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff6b6b;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 999;
        }

        #errorMessage.active {
            opacity: 1;
            pointer-events: all;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                grid-column: 1;
                grid-row: auto;
            }

            .weather-content {
                grid-column: 1;
            }

            .weather-header {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2em;
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .search-controls {
                flex-direction: column;
            }

            #locationInput {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time weather data from around the world</p>
        </header>

        <div class="main-content">
            <div class="search-section">
                <div class="search-controls">
                    <input 
                        type="text" 
                        id="locationInput" 
                        placeholder="Search for a city..." 
                        onkeypress="handleKeyPress(event)"
                    >
                    <button class="btn btn-primary" onclick="searchWeather()">
                        <i class="fas fa-search"></i> Search
                    </button>
                    <button class="btn btn-secondary" onclick="getCurrentLocation()">
                        <i class="fas fa-location-dot"></i> Current Location
                    </button>
                    <div class="unit-selector">
                        <button id="celsiusBtn" class="active" onclick="setUnit('metric')">°C</button>
                        <button id="fahrenheitBtn" onclick="setUnit('imperial')">°F</button>
                    </div>
                </div>
            </div>

            <div class="weather-content">
                <div id="currentWeather"></div>
                <div id="forecast"></div>
            </div>

            <div class="sidebar">
                <div id="favorites"></div>
            </div>
        </div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p>Loading weather data...</p>
    </div>

    <div id="errorMessage"></div>

    <script src="weather.js"></script>
</body>
</html>
